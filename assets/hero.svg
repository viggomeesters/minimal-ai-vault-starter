<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title desc">
  <title id="title">Minimal AI Vault Starter</title>
  <desc id="desc">A read-only daily note flow into deterministic JSONL records, generated views, and AI-ready context.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="1" stop-color="#16213d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect x="72" y="76" width="1136" height="488" rx="36" fill="#0f172a" stroke="#334155" stroke-width="2"/>
  <text x="110" y="172" fill="#e2e8f0" font-family="Inter, Arial, sans-serif" font-size="30" letter-spacing="3">MINIMAL AI VAULT STARTER</text>
  <text x="110" y="260" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="64" font-weight="800">Daily notes stay human.</text>
  <text x="110" y="334" fill="#f8fafc" font-family="Inter, Arial, sans-serif" font-size="64" font-weight="800">JSONL becomes context.</text>
  <text x="112" y="410" fill="#bae6fd" font-family="Inter, Arial, sans-serif" font-size="30">No LLM required • deterministic extract • cited generated views</text>
  <g transform="translate(875 165)">
    <rect x="0" y="0" width="250" height="310" rx="22" fill="#111827" stroke="#38bdf8" stroke-width="3"/>
    <text x="28" y="58" fill="#f8fafc" font-family="monospace" font-size="26">daily.md</text>
    <line x1="28" y1="86" x2="218" y2="86" stroke="#475569" stroke-width="3"/>
    <text x="28" y="132" fill="#cbd5e1" font-family="monospace" font-size="20">- claim</text>
    <text x="28" y="174" fill="#cbd5e1" font-family="monospace" font-size="20">- task</text>
    <text x="28" y="216" fill="#cbd5e1" font-family="monospace" font-size="20">- decision</text>
    <path d="M-105 155 H-20" stroke="url(#accent)" stroke-width="8" stroke-linecap="round"/>
    <path d="M-40 132 L-15 155 L-40 178" fill="none" stroke="url(#accent)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="-260" y="165" fill="#93c5fd" font-family="monospace" font-size="24">records/*.jsonl</text>
  </g>
</svg>
